# Stack do Novo Painel 3 Amores (com banco direto) — bmesquita21/3amorespainel
# Container separado do painel legado — não interfere com ele.
# O Nginx Proxy Manager roteia um domínio diferente para este container.

services:
  painel-db:
    build: .
    image: painel-3amores-db:latest
    container_name: painel-db
    restart: unless-stopped
    environment:
      - PAINEL_DADOS=/dados
      # Conexão direta com ERP Auditor (Firebird 4) — somente leitura
      - FB_HOST=192.168.100.201
      - FB_PORT=3050
      - FB_DATABASE=/opt/Auditor/Dados/AUDITOR.FDB
      - FB_USER=RO_AUDITOR
      - FB_PASSWORD=3@mores
      - FB_CHARSET=WIN1252
      - FB_CLIENT_LIBRARY=/usr/lib/x86_64-linux-gnu/libfbclient.so.2
    volumes:
      - /mnt/dados-painel:/dados
    expose:
      - "8501"
    networks:
      - npm-network

networks:
  npm-network:
    external: true
